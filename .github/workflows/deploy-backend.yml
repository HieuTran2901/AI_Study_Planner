name: Deploy Backend to EC2 (Production Clean)

on:
  push:
    branches: ["master"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Build JAR
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Upload JAR to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          source: "target/*.jar"
          target: "/home/ubuntu/app/"
          strip_components: 1

      - name: Deploy & Run on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            cd /home/ubuntu/app

            echo "=== STOP OLD APP ==="
            if [ -f app.pid ]; then
              PID=$(cat app.pid)
              echo "Killing PID: $PID"
              kill -9 $PID || true
              rm -f app.pid
            fi

            echo "=== EXPORT ENV ==="
            export DB_HOST="${{ secrets.DB_HOST }}"
            export DB_PORT="${{ secrets.DB_PORT }}"
            export DB_NAME="${{ secrets.DB_NAME }}"
            export DB_USERNAME="${{ secrets.DB_USERNAME }}"
            export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            export OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}"

            echo "Checking OPENROUTER_API_KEY:"
            if [ -z "$OPENROUTER_API_KEY" ]; then
              echo "❌ OPENROUTER_API_KEY IS EMPTY"
            else
              echo "✅ OPENROUTER_API_KEY LOADED"
            fi

            echo "=== START APP ==="
            JAR_FILE=$(ls -t *.jar | head -n 1)
            echo "Running: $JAR_FILE"

            nohup java \
              -Xms256m -Xmx512m \
              -Djava.net.preferIPv4Stack=true \
              -jar $JAR_FILE \
              > app.log 2>&1 &

            echo $! > app.pid

            sleep 2

            echo "=== VERIFY PROCESS ==="
            ps -p $(cat app.pid) || echo "❌ PROCESS NOT RUNNING"

            echo "=== DEPLOY DONE ==="
