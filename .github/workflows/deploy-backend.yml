name: Deploy Backend to EC2 (Production Clean)

on:
  push:
    branches: ["master"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Build JAR
        run: chmod +x mvnw && ./mvnw clean package -DskipTests

      # =========================
      # COPY JAR CLEAN (NO TARGET FOLDER)
      # =========================
      - name: Upload JAR to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          source: "target/*.jar"
          target: "/home/ubuntu/app/app.jar"
          strip_components: 1

      # =========================
      # DEPLOY
      # =========================
      - name: Deploy & Run on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            cd /home/ubuntu/app

            echo "=============================="
            echo "Stopping old application"
            echo "=============================="

            if [ -f app.pid ]; then
              kill $(cat app.pid) || true
              rm -f app.pid
            fi

            echo "=============================="
            echo "Cleaning old logs (optional)"
            echo "=============================="
            rm -f app.log

            echo "=============================="
            echo "Starting new application"
            echo "=============================="

            if [ ! -f app.jar ]; then
              echo "ERROR: app.jar not found!"
              exit 1
            fi

            nohup java \
              -jar app.jar \
              --spring.datasource.url=jdbc:mysql://${{ secrets.DB_HOST }}:${{ secrets.DB_PORT }}/${{ secrets.DB_NAME }}?useSSL=false&serverTimezone=UTC \
              --spring.datasource.username=${{ secrets.DB_USERNAME }} \
              --spring.datasource.password=${{ secrets.DB_PASSWORD }} \
              --server.port=8080 \
              > app.log 2>&1 & echo $! > app.pid

            echo "=============================="
            echo "Deployment SUCCESS"
            echo "=============================="
