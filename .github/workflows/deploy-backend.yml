name: Deploy Backend to EC2 (Production Clean)

on:
  push:
    branches: ["master"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. CHECKOUT CODE
      # =========================
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================
      # 2. SETUP JAVA
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      # =========================
      # 3. BUILD JAR
      # =========================
      - name: Build JAR
        run: chmod +x mvnw && ./mvnw clean package -DskipTests

      # =========================
      # 4. COPY JAR TO EC2 (CLEAN)
      # =========================
      - name: Upload JAR to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          source: "target/*.jar"
          target: "/home/ubuntu/app/"
          strip_components: 1

      # =========================
      # 5. DEPLOY ON EC2
      # =========================
      - name: Deploy & Run on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            cd /home/ubuntu/app

            echo "=============================="
            echo "LIST FILES AFTER DEPLOY"
            echo "=============================="
            ls -la

            echo "=============================="
            echo "FIND JAR FILE"
            echo "=============================="

            JAR_FILE=$(ls -t *.jar 2>/dev/null | head -n 1)

            if [ -z "$JAR_FILE" ]; then
              echo "ERROR: No JAR file found!"
              exit 1
            fi

            echo "Using JAR: $JAR_FILE"

            echo "=============================="
            echo "STOP OLD APP"
            echo "=============================="

            if [ -f app.pid ]; then
              kill $(cat app.pid) || true
              rm -f app.pid
            fi

            echo "=============================="
            echo "START NEW APP"
            echo "=============================="

            nohup java \
              -jar $JAR_FILE \
              --spring.datasource.url=jdbc:mysql://${{ secrets.DB_HOST }}:${{ secrets.DB_PORT }}/${{ secrets.DB_NAME }}?useSSL=false&serverTimezone=UTC \
              --spring.datasource.username=${{ secrets.DB_USERNAME }} \
              --spring.datasource.password=${{ secrets.DB_PASSWORD }} \
              --server.port=8080 \
              > app.log 2>&1 & echo $! > app.pid

            echo "=============================="
            echo "DEPLOY SUCCESS"
            echo "=============================="
